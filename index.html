<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Kanban colaborativo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="user-selector">
    <label>👤 Usuario:</label>
    <select id="userSelect"></select>
  </div>

  <div class="view-switcher">
    <button id="viewAllBtn" class="view-btn active">📋 Todas las tareas</button>
    <button id="viewMyBtn" class="view-btn">👤 Mis tareas</button>
  </div>
</div>

<div class="app">

  <!-- PROYECTOS -->
  <aside class="projects">
    <div class="header">
      <h3>Proyectos</h3>
      <button id="btnAddProject" class="btn-icon primary">＋</button>
    </div>

    <div id="projectList"></div>

    <button id="btnDeleteProject" class="danger">
      🗑 Eliminar proyecto
    </button>
  </aside>

  <!-- HISTORIAL -->
  <aside class="history">
    <div class="header">
      <h3>Historial</h3>
      <button id="btnAddComment" class="btn-icon">＋</button>
    </div>

    <div id="commentList"></div>
  </aside>

  <!-- KANBAN -->
  <main class="board">

    <div class="column" data-status="todo">
      <div class="column-header">
        <h4>Pendiente</h4>
        <button class="addTask primary-btn">+ Nueva</button>
      </div>
      <div class="tasks"></div>
    </div>

    <div class="column" data-status="doing">
      <div class="column-header">
        <h4>En Proceso</h4>
      </div>
      <div class="tasks"></div>
    </div>

    <div class="column" data-status="review">
      <div class="column-header">
        <h4>Revisión</h4>
      </div>
      <div class="tasks"></div>
    </div>

    <div class="column" data-status="done">
      <div class="column-header">
        <h4>Hecho</h4>
      </div>
      <div class="tasks"></div>
    </div>

  </main>
</div>

<!-- MODALES -->
<div class="modal hidden" id="modalProject">
  <div class="modal-content">
    <h3>Nuevo Proyecto</h3>
    <input id="projectName" placeholder="Nombre del proyecto">
    <div class="modal-actions">
      <button onclick="closeModal()">Cancelar</button>
      <button id="saveProject">Guardar</button>
    </div>
  </div>
</div>

<div class="modal hidden" id="modalComment">
  <div class="modal-content">
    <h3>Nuevo Comentario</h3>
    <textarea id="commentText"></textarea>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancelar</button>
      <button id="saveComment">Guardar</button>
    </div>
  </div>
</div>

<div class="modal hidden" id="taskModal">
  <div class="modal-content">
    <h3>Nueva Tarea</h3>
    <input id="taskTitle" placeholder="Título">
    <textarea id="taskDescription" placeholder="Descripción"></textarea>

    <select id="taskPriority">
      <option value="low">Baja</option>
      <option value="medium">Media</option>
      <option value="high">Alta</option>
    </select>

    <input type="date" id="taskDue">

    <select id="taskAssignedTo" required>
      <option value="">-- Responsable --</option>
    </select>

    <div class="modal-actions">
      <button onclick="closeModal()">Cancelar</button>
      <button id="saveTask">Guardar</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
